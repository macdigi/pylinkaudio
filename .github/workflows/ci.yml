name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, ubuntu-24.04-arm]
        python: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm needs full history (or at least the most recent
          # tag) to compute a stable version. Shallow clones cause it to
          # emit two different version strings at different build stages
          # ("Metadata mismatch in METADATA").
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build and install editable
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke import
        run: |
          python -c "
          from pylinkaudio import (
              Link, SessionState, LinkAudio, NodeId,
              Channel, AudioSource, AudioSink, __version__,
          )
          print('pylinkaudio', __version__)
          # Quick construct check — would catch the ODR-mutex regression.
          la = LinkAudio(120.0, 'ci')
          la.enabled = True
          la.enabled = False
          print('OK')
          "

      - name: Run tests (skip network)
        run: pytest -m "not network" tests/ -v
