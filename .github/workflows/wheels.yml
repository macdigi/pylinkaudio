name: Build wheels

# Trigger on tag push (v*) or manual dispatch. Tagged builds also fire CI
# (which runs editable installs + tests); this workflow produces the actual
# distributable wheels and an sdist as artifacts.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.os }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, ubuntu-24.04-arm]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs full history

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # cp311 is mandatory — Pi OS Bookworm ships Python 3.11.
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          # No Alpine (musllinux) — we don't target those for v0.1.
          CIBW_SKIP: "*-musllinux_*"
          # Skip the pre-test inside cibuildwheel; the CI workflow runs full
          # tests separately.
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_VERBOSITY: "1"
          # Cap parallelism; FetchContent + pybind11 + Link templates are
          # memory-hungry, especially in the manylinux2014 containers.
          CIBW_ENVIRONMENT: "CMAKE_BUILD_PARALLEL_LEVEL=2"
          # manylinux2014 (CentOS 7-based) doesn't include libatomic in the
          # base image. `yum install libatomic` lays down libatomic.so.1
          # (the runtime), but the unversioned libatomic.so symlink that
          # the linker's -latomic resolves against ships in libatomic-devel.
          # Install both, and as a belt-and-braces fallback create the
          # symlink ourselves in case the -devel package vanishes upstream.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y libatomic libatomic_static libatomic-devel || yum install -y libatomic;
            for d in /usr/lib64 /usr/lib /lib64 /lib; do
              if [ -e "$d/libatomic.so.1" ] && [ ! -e "$d/libatomic.so" ]; then
                ln -s libatomic.so.1 "$d/libatomic.so";
              fi;
            done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
